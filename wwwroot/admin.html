<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
            background: #f4f6f9;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }

        .logout {
            float: right;
            margin-bottom: 20px;
        }
    </style>

</head>
<body>

    <h1>Admin Panel</h1>

    <button class="logout" onclick="logout()">Logout</button>

    <h2>Kullanıcı Listesi</h2>

    <table id="usersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Roles</th>
                <th>Permissions</th>
            </tr>
        </thead>

        <tbody id="usersBody">
        </tbody>
    </table>

    <script src="/admin.js"></script>

</body>
</html>
